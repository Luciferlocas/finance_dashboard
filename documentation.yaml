openapi: 3.0.0

info:
  title: Finance Dashboard API
  description: Comprehensive API documentation for the Finance Dashboard System backend.
  version: 1.0.0

servers:
  - name: Development
    url: http://localhost:4000/api
  - name: Production
    url: https://finance-dashboard-j9fl.onrender.com/api

tags:
  - name: User
    description: User management APIs
  - name: Records
    description: Financial record APIs
  - name: Dashboard
    description: Dashboard analytics APIs

components:
  securitySchemes:
    token:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:

  /user/login:
    post:
      tags: [User]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Successful login

  /user:
    get:
      tags: [User]
      summary: Get All Users
      security:
        - token: []
      responses:
        "200":
          description: Successful response

    post:
      tags: [User]
      summary: Register New User
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
      responses:
        "200":
          description: User created

  /user/role:
    put:
      tags: [User]
      summary: Update User Role
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                role:
                  type: string
      responses:
        "200":
          description: Role updated

  /user/status:
    put:
      tags: [User]
      summary: Update User Status
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                status:
                  type: string
      responses:
        "200":
          description: Status updated

  /user/{id}:
    delete:
      tags: [User]
      summary: Delete User
      security:
        - token: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User deleted

  /records:
    post:
      tags: [Records]
      summary: Create Record
      security:
        - token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                type:
                  type: string
                category:
                  type: string
                notes:
                  type: string
                date:
                  type: string
      responses:
        "200":
          description: Record created

    get:
      tags: [Records]
      summary: Get Records
      security:
        - token: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Records fetched

  /records/{id}:
    get:
      tags: [Records]
      summary: Get Single Record
      security:
        - token: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Record fetched

    put:
      tags: [Records]
      summary: Update Record
      security:
        - token: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                notes:
                  type: string
      responses:
        "200":
          description: Record updated

    delete:
      tags: [Records]
      summary: Delete Record
      security:
        - token: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Record deleted

  /dashboard:
    get:
      tags: [Dashboard]
      summary: Get Dashboard Summary
      security:
        - token: []
      responses:
        "200":
          description: Dashboard data fetched